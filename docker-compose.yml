# docker-compose.yml

version: "3.9"

# ── Variables partagées ───────────────────────────────────────────────────────
# Centralise les valeurs répétées entre api et worker.
# En production, remplacez ces valeurs par des secrets (Railway Variables, etc.)
x-db-env: &db-env
  DATABASE_URL: postgresql://scannage_user:changez_ce_mot_de_passe@postgres:5432/scannage

x-redis-env: &redis-env
  REDIS_URL: redis://redis:6379

x-app-env: &app-env
  <<: *db-env
  <<: *redis-env
  UPLOAD_DIR: /app/uploads

services:

  # ── Base de données ───────────────────────────────────────────────────────
  postgres:
    image: postgres:16
    container_name: scannage_postgres
    restart: always
    environment:
      POSTGRES_DB: scannage
      POSTGRES_USER: scannage_user
      POSTGRES_PASSWORD: changez_ce_mot_de_passe
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U scannage_user -d scannage"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── File d'attente ────────────────────────────────────────────────────────
  redis:
    image: redis:7
    container_name: scannage_redis
    restart: always
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ── Stockage objet local MinIO ───────────────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: scannage_minio
    restart: always
    environment:
      MINIO_ROOT_USER: scannage_admin
      MINIO_ROOT_PASSWORD: changez_ce_mot_de_passe
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://127.0.0.1:9000/minio/health/live || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ── API principale ────────────────────────────────────────────────────────
  api:
    build:
      context: .          # racine du projet (là où se trouve le Dockerfile)
      dockerfile: Dockerfile
    container_name: scannage_api
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      <<: *app-env
      STORAGE_ENDPOINT: minio:9000
      STORAGE_ACCESS_KEY: scannage_admin
      STORAGE_SECRET_KEY: changez_ce_mot_de_passe
      STORAGE_BUCKET: scannage-cloud
      STORAGE_SECURE: "false"
    volumes:
      - uploads_data:/app/uploads   # volume partagé avec le worker
    ports:
      - "8000:8000"
    # CMD par défaut du Dockerfile : uvicorn api.main:app

  # ── Worker OCR ────────────────────────────────────────────────────────────
  worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: scannage_worker
    restart: always
    command: ["python", "-m", "api.worker"]   # surcharge le CMD uvicorn
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      <<: *app-env
      STORAGE_ENDPOINT: minio:9000
      STORAGE_ACCESS_KEY: scannage_admin
      STORAGE_SECRET_KEY: changez_ce_mot_de_passe
      STORAGE_BUCKET: scannage-cloud
      STORAGE_SECURE: "false"
    volumes:
      - uploads_data:/app/uploads   # même volume que l'API — lit les fichiers uploadés

volumes:
  postgres_data:
  redis_data:
  uploads_data:   # partagé API ↔ Worker, persistant entre redémarrages
  minio_data:     # données persistantes MinIO
